                    "εμείς": "γινόμαστε",
                    "εσείς": "γίνεστε",
                    "αυτοί": "γίνονται"
                },
                "Αόριστος": {
                    "εγώ": "έγινα",
                    "εσύ": "έγινες",
                    "αυτός/αυτή": "έγινε",
                    "εμείς": "γίναμε",
                    "εσείς": "γίνατε",
                    "αυτοί": "έγιναν"
                },
                "Μέλλοντας": {
                    "εγώ": "θα γίνω",
                    "εσύ": "θα γίνεις",
                    "αυτός/αυτή": "θα γίνει",
                    "εμείς": "θα γίνουμε",
                    "εσείς": "θα γίνετε",
                    "αυτοί": "θα γίνουν"
                }
            },
            {
                "verb_ru": "сидеть",
                "verb_gr": "κάθομαι",
                "Ενεστώτας": {
                    "εγώ": "κάθομαι",
                    "εσύ": "κάθεσαι",
                    "αυτός/αυτή": "κάθεται",
                    "εμείς": "καθόμαστε",
                    "εσείς": "κάθεστε",
                    "αυτοί": "κάθονται"
                },
                "Αόριστος": {
                    "εγώ": "κάθισα",
                    "εσύ": "κάθισες",
                    "αυτός/αυτή": "κάθισε",
                    "εμείς": "καθίσαμε",
                    "εσείς": "καθίσατε",
                    "αυτοί": "κάθισαν"
                },
                "Μέλλοντας": {
                    "εγώ": "θα καθίσω",
                    "εσύ": "θα καθίσεις",
                    "αυτός/αυτή": "θα καθίσει",
                    "εμείς": "θα καθίσουμε",
                    "εσείς": "θα καθίσετε",
                    "αυτοί": "θα καθίσουν"
                }
            },
        ];
        const randomVerb = { verb: null, person: null, time: null };
        let time = ['Ενεστώτας', 'Αόριστος', 'Μέλλοντας'];
        const time_i = {
            'Ενεστώτας': 'настоящее',
            'Αόριστος': 'прошлое',
            'Μέλλοντας': 'будущее'
        };

        const getRandom = arr => arr[Math.floor(Math.random() * arr.length)]
        const getRandomVerb = () => getRandom(verbs);
        const getRandomTime = () => getRandom(time);
        const getRandomPerson = () => getRandom(['εγώ', 'εσύ', 'αυτός/αυτή', 'εμείς', 'εσείς', 'αυτοί']);

        const nextRandomVerb = () => {
            randomVerb.verb = getRandomVerb();
            randomVerb.time = getRandomTime();
            randomVerb.person = getRandomPerson(randomVerb.verb[randomVerb.time]);

            const questTitle = document.querySelector("#quest-title");
            questTitle.textContent = `${randomVerb.verb.verb_ru} - ${time_i[randomVerb.time]} - ${randomVerb.person}`;
            const questAnswer = document.querySelector("#quest-answer");
            questAnswer.style.color = 'rgba(0,0,0,0)';
            questAnswer.textContent = randomVerb.verb[randomVerb.time][randomVerb.person];
        }

        const showAnswer = () => {
            const questAnswer = document.querySelector("#quest-answer");

            if (questAnswer.style.color === 'white') {
                nextRandomVerb();
            } else {
                questAnswer.style.color = 'white';
            }
        }

        const config = () => {
            time = [...document.querySelectorAll(".config-time:checked")].map(i => i.getAttribute("data"));

            if (!time.length) {
                time = ['Ενεστώτας', 'Αόριστος', 'Μέλλοντας'];
            }
        }

        setTimeout(nextRandomVerb, 1000);
        window.addEventListener("keypress", showAnswer);
    </script>
    <style>
        * {
            background: black;
            color: white;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #quest {
            border: 1px solid white;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            min-width: 50%;
            cursor: pointer;
        }

        #quest-title,
        #quest-answer {
            padding: 10px;
            text-align: center;
            user-select: none;
        }

        #quest-title {
            font-size: 24pt;
        }

        #quest-answer {
            font-size: 40pt;
        }

        #config {
            font-size: 16pt;
            position: fixed;
            border: 1px solid white;
            border-radius: 5px;
            padding: 10px;
            right: 5px;
            bottom: 5px;
        }
    </style>

    <div id="quest" onclick="showAnswer()">
        <div id="quest-title">...</div>
        <div id="quest-answer">...</div>
    </div>

    <div id="config">
        <div><input class="config-time" type="checkbox" data="Ενεστώτας" checked onchange="config()" /> - настоящее</div>
        <div><input class="config-time" type="checkbox" data="Αόριστος" checked onchange="config()" /> - прошлое</div>
        <div><input class="config-time" type="checkbox" data="Μέλλοντας" checked onchange="config()" /> - будущее</div>
    </div>
</body>
</html>
