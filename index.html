<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8">
</head>
<body>
<style>
  * {
    --text-color: white;
    --background-color: black;
    --text-color-wrong: #f77;
    --text-color-correct: #7f7;
    --text-color-time-0: #ffc;
    --text-color-time-1: #cff;
    --text-color-time-2: #fcf;
    --text-color-btn-active: #afa;
    --text-color-btn-neutral: #555;

    background: var(--background-color);
    color: var(--text-color);
    font-family: sans-serif;
    user-select: none;
  }

  body.light, body.light * {
    --text-color: black;
    --background-color: white;
    --text-color-wrong: #a00;
    --text-color-correct: #0a0;
    --text-color-time-0: #500;
    --text-color-time-1: #050;
    --text-color-time-2: #005;
    --text-color-btn-active: #050;
    --text-color-btn-neutral: #ccc;
  }

  hr {
    width: 100%;
  }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  input[type=button], select {
    cursor: pointer;
    padding: 10px;
  }

  input[type=button]:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  body.light input[type=button]:hover {
    background: rgba(0, 0, 0, 0.1);
  }

  #quest, #config, #verbs {
    border: 1px solid var(--text-color);
    border-radius: 10px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    min-width: 50%;
    cursor: pointer;
  }

  .test-answer {
    border-radius: 10px;
    border: 1px solid var(--text-color);
  }

  #config, #verbs, #quest-answer-test, #quest-answer-text-wrapper, #quest-answer {
    display: none;
  }

  #verbs {
    max-height: calc(100vh - 250px);
    overflow-y: auto;
  }

  #verbs td {
    padding: 5px;
  }

  #verbs tr.verb-time-0 > td {
    color: var(--text-color-time-0);
  }

  #verbs tr.verb-time-1 > td {
    color: var(--text-color-time-1);
  }

  #verbs tr.verb-time-2 > td {
    color: var(--text-color-time-2);
  }

  #quest-title,
  #quest-answer {
    padding: 10px;
    text-align: center;
  }

  #quest-title, #verbs > table {
    font-size: 24pt;
  }

  #quest-answer {
    font-size: 40pt;
  }

  #config-btn, #verbs-btn {
    font-size: 16pt;
    border: 1px solid var(--text-color);
    border-radius: 5px;
    padding: 10px;
    cursor: pointer;
    align-self: end;
  }

  #verbs-btn {
    align-self: start;
  }

  #config-btn:hover, #verbs-btn:hover {
    text-decoration: underline;
  }

  #config-btn:active, #verbs-btn:active {
    color: var(--text-color-btn-active);
  }

  label.config-time, label.config-answer-text {
    padding: 10px;
  }

  input.config-time, input.config-answer-text {
    width: 25px;
    height: 25px;
  }

  #quest-answer-text-wrapper {
    flex-direction: row;
    flex-wrap: wrap;
  }

  #quest-answer-test {
    flex-wrap: wrap;
  }

  #quest-answer-test > input[type=button] {
    display: flex;
    flex: 1 1 auto;
    font-size: 18pt;
    margin: 5px;
  }

  #quest-answer-text {
    padding: 10px;
    font-size: 24pt;
    display: flex;
    flex: 1 1 auto;
    border-radius: 10px 0 0 10px;
  }

  #quest-answer-text-wrapper > input[type=button] {
    background: var(--text-color-btn-neutral);
    border-radius: 0 10px 10px 0;
  }

  .config-time-row {
    display: flex;
    flex-direction: row;
    justify-content: start;
    align-items: center;
    flex-wrap: wrap;
  }

  #statistics {
    display: flex;
    flex: 0 0 auto;
    padding: 15px;
    color: var(--text-color-btn-neutral);
  }

  @media only screen and (max-width: 650px) {
    #quest-answer-text {
      font-size: 15pt;
      width: 100%;
    }

    #quest-answer-text-wrapper #check-text-answer {
      border-radius: 10px;
      margin-top: 10px;
      padding: 15px;
      width: 100%;
    }

    #quest-answer-text-wrapper {
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #quest-answer {
      font-size: 32pt;
    }
  }

  .content-wrapper {
    display: flex;
    flex: 1 1 auto;
    align-items: center;
    justify-content: center;
    padding: 15px;
  }

  .footer {
    display: flex;
    flex: 0 0 auto;
    padding: 15px;
    flex-direction: row;
    justify-content: space-between;
  }
</style>
<div id="statistics"></div>

<div class="content-wrapper">
  <div id="quest">
    <div id="quest-title">...</div>
    <div id="quest-answer">...</div>
    <div id="quest-answer-text-wrapper">
      <input id="quest-answer-text" />
      <input type="button" id="check-text-answer" value="проверить" />
    </div>
    <div id="quest-answer-test">
      <input type="button" class="test-answer" id="test-answer-1" />
      <input type="button" class="test-answer" id="test-answer-2" />
      <input type="button" class="test-answer" id="test-answer-3" />
      <input type="button" class="test-answer" id="test-answer-4" />
    </div>
  </div>

  <div id="config">
    <div class="config-time-row">
      <label for="config-answer-type" class="config-answer-text">Ввод ответа:</label>
      <select id="config-answer-type">
        <option value="простое открытие">простое открытие</option>
        <option value="тест">тест с вариантами</option>
        <option value="полнотекстовый ввод">полнотекстовый ввод</option>
      </select>
    </div>
    <hr />
    <div class="config-time-row">
      <input id="config-time-present" class="config-time" type="checkbox" data="Ενεστώτας" checked />
      <label for="config-time-present" class="config-time"> — настоящее</label>
    </div>
    <div class="config-time-row">
      <input id="config-time-past" class="config-time" type="checkbox" data="Αόριστος" checked />
      <label for="config-time-past" class="config-time"> — прошлое</label>
    </div>
    <div class="config-time-row">
      <input id="config-time-future" class="config-time" type="checkbox" data="Μέλλοντας" checked />
      <label for="config-time-future" class="config-time"> — будущее</label>
    </div>
    <hr />
      <label for="config-theme" class="config-theme">Тема:</label>
      <select id="config-theme">
        <option value="темная">темная</option>
        <option value="светлая">светлая</option>
      </select>
    <hr />
    <input id="config-close" type="button" value="закрыть" />
  </div>

  <div id="verbs"></div>
</div>

<div class="footer">
  <button id="verbs-btn">глагол</button>
  <button id="config-btn">настройки</button>
</div>

<script>
  if (localStorage.getItem("theme") === "светлая") {
    document.body.classList.add("light");
  } else {
    document.body.classList.remove("light");
  }

  window.onload = async () => {
    const elements = {
      config: document.querySelector("#config"),
      quest: document.querySelector("#quest"),
      questTitle: document.querySelector("#quest-title"),
      questAnswer: document.querySelector("#quest-answer"),
      questAnswerTest: document.querySelector("#quest-answer-test"),
      questAnswerText: document.querySelector("#quest-answer-text"),
      questAnswerTextWrapper: document.querySelector("#quest-answer-text-wrapper"),
      configAnswerType: document.querySelector("#config-answer-type"),
      configTheme: document.querySelector("#config-theme"),
      testAnswer1: document.querySelector("#test-answer-1"),
      testAnswer2: document.querySelector("#test-answer-2"),
      testAnswer3: document.querySelector("#test-answer-3"),
      testAnswer4: document.querySelector("#test-answer-4"),
      statistics: document.querySelector("#statistics"),
      verbs: document.querySelector("#verbs"),
    };

    document.querySelectorAll("input.config-time, #config-answer-type, #config-theme").forEach(el => el.onchange = updateConfig);
    document.querySelectorAll(".test-answer").forEach(el => el.onclick = selectTestAnswer);
    document.querySelector("#config-btn").onclick = toggleSettings;
    document.querySelector("#verbs-btn").onclick = toggleVerbs;
    document.querySelector("#config-close").onclick = toggleSettings;
    document.querySelector("#check-text-answer").onclick = () => checkAnswerText();
    elements.quest.onclick = showAnswer;

    const verbs = await fetch("https://kulikovee.github.io/greek-language-helper/verbs-1.json").then(res => res.json());
    const randomVerb = { verb: null, person: null, time: null };
    let time = null;
    let answerType = null;
    let theme = null;
    let totalAnswered = 0;
    let totalMistakes = 0;

    const time_i = {
      'Ενεστώτας': 'настоящее',
      'Αόριστος': 'прошлое',
      'Μέλλοντας': 'будущее'
    };

    const getRandom = arr => arr[Math.floor(Math.random() * arr.length)]

    function nextRandomVerb() {
      randomVerb.verb = getRandom(verbs);
      randomVerb.time = getRandom(time);
      randomVerb.person = getRandom(['εγώ', 'εσύ', 'αυτός/αυτή', 'εμείς', 'εσείς', 'αυτοί']);

      elements.questTitle.textContent = `${randomVerb.verb.verb_ru} - ${time_i[randomVerb.time]} - ${randomVerb.person}`;
      elements.questAnswer.style.color = 'rgba(0, 0, 0, 0)';

      const correctAnswer = randomVerb.verb[randomVerb.time][randomVerb.person];
      elements.questAnswer.textContent = correctAnswer;
      generateTestAnswers(correctAnswer);
      updateVerbList();
    }

    function showAnswer() {
      if (answerType === "простое открытие") {
        if (elements.questAnswer.style.color === 'rgba(0, 0, 0, 0)') {
          elements.questAnswer.style.color = theme === 'светлая' ? 'black' : 'white';
        } else {
          nextRandomVerb();
        }
      }
    }

    function updateConfig() {
      time = [...document.querySelectorAll("input.config-time:checked")].map(i => i.getAttribute("data"));
      answerType = document.querySelector("#config-answer-type").value;
      theme = elements.configTheme.value;

      if (!time.length) {
        time = ['Ενεστώτας', 'Αόριστος', 'Μέλλοντας'];
      }

      localStorage.setItem("time", JSON.stringify(time));
      localStorage.setItem("answerType", answerType);
      localStorage.setItem("theme", theme);

      elements.questAnswerTextWrapper.style.display = answerType === "полнотекстовый ввод" ? "flex" : "none";
      elements.questAnswerTest.style.display = answerType === "тест" ? "flex" : "none";
      elements.questAnswer.style.display = answerType === "простое открытие" ? "block" : "none";
      elements.statistics.style.display = answerType !== "простое открытие" ? "block" : "none";

      if (theme === "светлая") {
        document.body.classList.add("light");
      } else {
        document.body.classList.remove("light");
      }
      updateStatistics();
    }

    function toggleSettings() {
      if (elements.config.style.display === "flex") {
        elements.config.style.display = "none";
        elements.quest.style.display = "flex";
        elements.verbs.style.display = "none";
      } else {
        elements.config.style.display = "flex";
        elements.quest.style.display = "none";
        elements.verbs.style.display = "none";
      }
    }

    function toggleVerbs() {
      if (elements.verbs.style.display === "flex") {
        elements.config.style.display = "none";
        elements.verbs.style.display = "none";
        elements.quest.style.display = "flex";
      } else {
        elements.config.style.display = "none";
        elements.verbs.style.display = "flex";
        elements.quest.style.display = "none";
      }
    }

    function checkAnswerText(e) {
      if (!e || (e.key === "Enter" || e.code === "Enter")) {
        const input = document.querySelector("#quest-answer-text");
        if (input.value.toLowerCase().replace("θα ", "").trim() === randomVerb.verb[randomVerb.time][randomVerb.person].toLowerCase().replace("θα ", "").trim()) {
          input.style.color = "var(--text-color-correct)";
          countSuccess();
          setTimeout(() => {
            input.value = "";
            nextRandomVerb();
          }, 500);
        } else {
          countMistakes();
          input.style.color = "var(--text-color-wrong)";
        }

        setTimeout(() => {
          input.style.color = "var(--text-color)";
        }, 500);
      }
    }

    function selectTestAnswer(e) {
      const input = e.target;
      if (input.value.toLowerCase().replace("θα ", "").trim() === randomVerb.verb[randomVerb.time][randomVerb.person].toLowerCase().replace("θα ", "").trim()) {
        input.style.color = "var(--text-color-correct)";
        countSuccess();
        setTimeout(() => {
          input.value = "";
          nextRandomVerb();
        }, 500);
      } else {
        input.style.color = "var(--text-color-wrong)";
        countMistakes();
      }

      setTimeout(() => {
        input.style.color = "var(--text-color)";
      }, 500);
    }

    function countMistakes() {
      totalMistakes++;
      updateStatistics();
    }

    function countSuccess() {
      totalAnswered++;
      updateStatistics();
    }

    function updateStatistics() {
      elements.statistics.textContent = `отвечено ${totalAnswered}, ошибок ${totalMistakes} (точность ${Math.round(100 * totalAnswered / ((totalAnswered + totalMistakes) || 1))}%)`;
    }

    if (localStorage.getItem("answerType")) {
      elements.configAnswerType.value = localStorage.getItem("answerType");
    }
    if (localStorage.getItem("theme")) {
      elements.configTheme.value = localStorage.getItem("theme");
    }
    if (localStorage.getItem("time")) {
      const defaultTime = JSON.parse(localStorage.getItem("time"));
      document.querySelector("input[data=Ενεστώτας]").checked = defaultTime.indexOf("Ενεστώτας") > -1;
      document.querySelector("input[data=Αόριστος]").checked = defaultTime.indexOf("Αόριστος") > -1;
      document.querySelector("input[data=Μέλλοντας]").checked = defaultTime.indexOf("Μέλλοντας") > -1;
    }
    updateConfig();

    setTimeout(nextRandomVerb, 1000);

    window.addEventListener("keypress", (e) => {
      if (answerType === "тест") {
        return;
      }

      if (answerType === "полнотекстовый ввод") {
        checkAnswerText(e);
      } else {
        showAnswer();
      }
    });

    function updateVerbList() {
      elements.verbs.innerHTML = "";
      const verbsList = document.createElement("table");
      ["Ενεστώτας", "Αόριστος", "Μέλλοντας"].forEach((t, i) => {
        Object.keys(randomVerb.verb[t]).forEach((key) => {
          const verbsListItem = document.createElement("tr");
          verbsListItem.classList.add("verb-time-" + i);
          const verbListItemPerson = document.createElement("td");
          verbListItemPerson.textContent = key;
          verbsListItem.append(verbListItemPerson);
          const verbListItemVerb = document.createElement("td");
          verbListItemVerb.textContent = randomVerb.verb[t][key];
          verbsListItem.append(verbListItemVerb);
          verbsList.append(verbsListItem);
        });
      });
      elements.verbs.append(verbsList);
    }

    function generateTestAnswers(correctAnswer) {
      const randomVariants = [];

      if (correctAnswer.slice(-2) === "τε") {
        randomVariants.push(correctAnswer.slice(0, -2) + "ςτε");
      }

      if (correctAnswer.slice(-3) === "ςτε") {
        randomVariants.push(correctAnswer.slice(0, -3) + "τε");
      }

      if (correctAnswer.slice(-3) === "ετε") {
        randomVariants.push(correctAnswer.slice(0, -3) + "ειτε");
      }

      if (correctAnswer.slice(-3) === "ειτε") {
        randomVariants.push(correctAnswer.slice(0, -3) + "ετε");
      }

      if (correctAnswer.slice(-4) === "ουμε") {
        randomVariants.push(correctAnswer.slice(0, -4) + "αμε");
      }

      if (correctAnswer.slice(-3) === "αμε") {
        randomVariants.push(correctAnswer.slice(0, -3) + "ουμε");
      }

      if (correctAnswer.slice(-3) === "ασα") {
        randomVariants.push(correctAnswer.slice(0, -3) + "εσα");
      }

      if (correctAnswer.slice(-3) === "εσα") {
        randomVariants.push(correctAnswer.slice(0, -3) + "ασα");
      }

      if (correctAnswer.slice(-3) === "ανε") {
        randomVariants.push(correctAnswer.slice(0, -3) + "ουν");
      }

      if (correctAnswer.slice(-3) === "ουν") {
        randomVariants.push(correctAnswer.slice(0, -3) + "ανε");
      }

      if (correctAnswer.slice(-3) === "ναν") {
        randomVariants.push(correctAnswer.slice(0, -3) + "ουν");
      }

      if (correctAnswer.slice(-1) === "ς") {
        randomVariants.push(correctAnswer + "α");
      }

      const replaces = {
        "ει": "ι",
        "εί": "ί",
        "οι": "ι",
        "οί": "ί",
        "ει": "υ",
        "εί": "ή",
        "οι": "υ",
        "οί": "ή",
        "ή": "ί",
        "ί": "ή",
        "η": "ι",
        "ύ": "ή",
        "ω": "ο",
        "ώ": "ό",
        "ο": "ω",
        "ό": "ώ",
        "αβ": "αυ",
        "εβ": "ευ",
        "εισε": "ησε",
        "είσε": "ήσε",
      };

      Object.keys(replaces).forEach(key => {

        if (correctAnswer.indexOf(key) > -1) {
          if (Math.random() > 0.5) {
            randomVariants.push(correctAnswer.replace(key, replaces[key]));
          } else {
            const idx = correctAnswer.lastIndexOf(key);
            randomVariants.push(correctAnswer.substring(0, idx) + replaces[key] + correctAnswer.substring(idx + key.length));
          }
        }
      });

      const wrongPersons = ['εγώ', 'εσύ', 'αυτός/αυτή', 'εμείς', 'εσείς', 'αυτοί']
        .filter(p => p !== randomVerb.person)
        .sort(() => Math.random() - 0.5);

      while (randomVariants.length < 3) {
        randomVariants.push(randomVerb.verb[randomVerb.time][wrongPersons.shift()]);
      }

      randomVariants.sort(() => Math.random() - 0.5);

      const answers = [elements.testAnswer1, elements.testAnswer2, elements.testAnswer3, elements.testAnswer4]
        .sort(() => Math.random() - 0.5);

      answers[0].value = correctAnswer;
      answers[1].value = randomVariants[0];
      answers[2].value = randomVariants[1];
      answers[3].value = randomVariants[2];
    }
  }
</script>
</body>
</html>
